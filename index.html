<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sanal Sergi</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0;">

    <model-viewer 
        src="sergi_modeli.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y" 
        alt="3D Sergi Modeli" 
        style="width: 100%; height: 100vh;">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            📽️ Sergiye Gir (AR)
        </button>

        <div id="controls" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);">
            <button onclick="location.href='tel:+905550000000'" style="padding: 15px; border-radius: 50px; background: #25D366; color: white; border: none; font-weight: bold;">
                📞 Hemen Ara
            </button>
        </div>

    </model-viewer>

</body>
</html>
