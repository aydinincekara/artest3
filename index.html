<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Sergi - Profesyonel Mod</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* Genel Konteynır */
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }

        /* AR Giriş Butonu - Alt Orta */
        #ar-button {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 999;
            display: block;
        }

        /* Fotoğraf Butonu - Alt Orta (AR içindeyken görünür) */
        #snapshot-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid white;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
        }
        
        #snapshot-button:active { background: white; }

        /* Bilgilendirme Notu */
        #status {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 5px black;
            pointer-events: none;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <div id="status">Büstü zemine yerleştirin</div>

    <model-viewer 
        id="ar-element"
        src="ata_renkli_full8.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        interaction-prompt="auto"
        touch-action="pan-y" 
        style="width: 100%; height: 100vh;">
        
        <button slot="ar-button" id="ar-button">
            🚀 SERGİYİ BAŞLAT (AR)
        </button>

        <div id="snapshot-button"></div>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#ar-element");
        const snapshotButton = document.querySelector("#snapshot-button");

        snapshotButton.addEventListener("click", async (event) => {
            // Tıklamanın büstün arkasına (zemine) geçmesini engeller
            event.stopPropagation();
            
            try {
                // toDataURL bazen toBlob'dan daha kararlı çalışabilir
                const url = modelViewer.toDataURL("image/png");
                const a = document.createElement("a");
                a.href = url;
                a.download = "Ataturk_Bust_AR.png";
                a.click();
                
                // Kullanıcıya bildirim ver
                document.querySelector("#status").innerText = "Fotoğraf Kaydedildi!";
                setTimeout(() => { document.querySelector("#status").innerText = ""; }, 2000);
            } catch (error) {
                alert("Tarayıcı güvenliği nedeniyle fotoğraf çekilemedi. Lütfen ekran görüntüsü alınız.");
            }
        });
    </script>

</body>
</html>
