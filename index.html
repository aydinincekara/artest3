<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AR Sergi - Fotoğraf Modu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        #snapshot-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid white;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 100;
        }
        #snapshot-button:active { background: white; }
    </style>
</head>
<body style="margin: 0;">

    <model-viewer 
        id="ar-element"
        src="ata_renkli_full8.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y" 
        style="width: 100%; height: 100vh;">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            📽️ Sergiye Gir
        </button>

        <button id="snapshot-button" type="button" aria-label="Fotoğraf Çek"></button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#ar-element");
        const snapshotButton = document.querySelector("#snapshot-button");

        snapshotButton.addEventListener("click", async () => {
            // Sadece model ve kamera akışını yakalar, butonları almaz
            const blob = await modelViewer.toBlob({ idealAspect: true });
            
            // Dosyayı oluştur ve indir
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "AR_Sergi_Hatirasi.png";
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>

</body>
</html>
